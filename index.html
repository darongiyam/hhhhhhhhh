<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="hhh.css">
</head>
<body>
<canvas id="confettiCanvas"></canvas>

  <main class="card">
    
    <img class="art" src="https://i.pinimg.com/originals/ee/91/0b/ee910b9efeb6da06d886c42cf354dc14.jpg" alt="내 사진" height="200" width="150">

    <h3 id="title">다롱이가 정현이에게 놀기 신청합니당~</h3>

    <section class="button-zone" id="zone">
      <button id="yesBtn">좋아</button>
      <button id="noBtn">싫어</button>
    </section>

    <!-- HINT -->
    <div class="hint" id="hint">싫어에 마우스 커서 갖다대 봐 ㅎㅎ</div>

    <section class="result" id="result">
      <h4>좋아요를 눌렀다면 다롱이에게 연락을 보내세용 -.-</h4>
      <img
        class="fireworks"
        src="https://blog.kakaocdn.net/dna/dqEadI/btrVBoq2uY1/AAAAAAAAAAAAAAAAAAAAANwdtHSizTB17UTM45dyr8ex3POvMOA8tcmo3tYYN2cz/img.gif?credential=yqXZFxpELC7KVnFOS48ylbz2pIh7yKj8&expires=1777561199&allow_ip=&allow_referer=&signature=zz5InkVq%2FHJ7%2Bdf0lTXonNipyrE%3D"
        height="200"
        width="100"
        alt="Fireworks"
      />
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <script>
    const zone = document.getElementById("zone");
    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");
    const result = document.getElementById("result");
    const hint = document.getElementById("hint");
    const title = document.getElementById("title");
    const art = document.querySelector(".art");

    /* ---------- CONFETTI ---------- */
    const confettiCanvas = document.getElementById("confettiCanvas");

    function resizeConfettiCanvas() {
      const dpr = Math.max(1, window.devicePixelRatio || 1);
      confettiCanvas.width = Math.floor(window.innerWidth * dpr);
      confettiCanvas.height = Math.floor(window.innerHeight * dpr);
      confettiCanvas.style.width = "100vw";
      confettiCanvas.style.height = "100vh";
    }

    resizeConfettiCanvas();
    window.addEventListener("resize", resizeConfettiCanvas);
    window.addEventListener("orientationchange", () => setTimeout(resizeConfettiCanvas, 150));

    const confettiInstance = confetti.create(confettiCanvas, {
      resize: false,
      useWorker: true
    });

    

    function fullScreenConfetti() {
      const end = Date.now() + 1600;

      (function frame() {
        confettiInstance({
          particleCount: 12,
          spread: 90,
          startVelocity: 45,
          ticks: 180,
          origin: { x: Math.random(), y: Math.random() * 0.3 }
        });
        if (Date.now() < end) requestAnimationFrame(frame);
      })();

      setTimeout(() => {
        confettiInstance({
          particleCount: 300,
          spread: 140,
          startVelocity: 60,
          ticks: 220,
          origin: { x: 0.5, y: 0.55 }
        });
      }, 300);
    }

    /* ---------- YES BUTTON GROWS ---------- */
    let yesScale = 1;
    function growYes() {
      yesScale = Math.min(2.2, yesScale + 0.1);
      yesBtn.style.transform = `translateY(-50%) scale(${yesScale})`;
    }

    /* ---------- NO BUTTON RUNS AWAY ---------- */
    function clamp(n, min, max) {
      return Math.max(min, Math.min(max, n));
    }

    function moveNo(px, py) {
      const z = zone.getBoundingClientRect();
      const b = noBtn.getBoundingClientRect();

      let dx = (b.left + b.width / 2) - px;
      let dy = (b.top + b.height / 2) - py;
      let mag = Math.hypot(dx, dy) || 1;
      dx /= mag;
      dy /= mag;

      let newLeft = (b.left - z.left) + dx * 150;
      let newTop  = (b.top - z.top) + dy * 150;

      newLeft = Math.max(0, Math.min(newLeft, z.width - b.width));
      newTop  = Math.max(0, Math.min(newTop, z.height - b.height));

      noBtn.style.left = newLeft + "px";
      noBtn.style.top = newTop + "px";

      growYes();

      noScale = Math.max(0.4, noScale - 0.05);
      noBtn.style.transform = `scale(${noScale})`;
    }

    zone.addEventListener("pointermove", e => {
      const b = noBtn.getBoundingClientRect();
      const d = Math.hypot(
        (b.left + b.width / 2) - e.clientX,
        (b.top + b.height / 2) - e.clientY
      );
      if (d < 140) moveNo(e.clientX, e.clientY);
    });

    noBtn.addEventListener("click", e => e.preventDefault());

    /* ---------- YES CLICK ---------- */
    yesBtn.addEventListener("click", () => {
    zone.style.display = "none";
    hint.style.display = "none";
    title.style.display = "none";
    result.style.display = "block";
    art.style.display = "none";

  resizeConfettiCanvas();
  fullScreenConfetti();
});

  </script>
  
</body>
</html>
